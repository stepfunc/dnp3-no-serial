name: CI
on:
  push:
    tags:
      - "*"
  pull_request:
jobs:
  # Windows MSVC x64 FFI  (Windows 7+)
  ffi-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc # 64-bit MSVC (Windows 7+)
    steps:
      - name: Checkout DNP3
        uses: actions/checkout@v6
        with:
          repository: stepfunc/dnp3
          ref: 1.6.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.79.0"
      - name: Create FFI modules dir
        run: mkdir ffi-modules\${{ matrix.target }}
      - name: Build FFI
        shell: bash
        run: cargo build --release -p dnp3-ffi --no-default-features --features tls --target ${{ matrix.target }} --message-format json-render-diagnostics > ffi-modules/${{ matrix.target }}/build.json
      - name: Copy .dll
        run: cp .\target\${{ matrix.target }}\release\dnp3_ffi.dll .\ffi-modules\${{ matrix.target }}
      - name: Upload FFI modules
        uses: actions/upload-artifact@v6
        with:
          name: ffi-modules-${{ matrix.target }}
          path: ffi-modules
  # Cross-compile FFI for Linux platforms
  ffi-cross:
    env:
      # By default, MUSL will not produce a cdylib with dynamic linkage to MUSL LIB C
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C target-feature=-crt-static"
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C target-feature=-crt-static"
      CARGO_TARGET_ARM_UNKNOWN_LINUX_MUSLEABIHF_RUSTFLAGS: "-C target-feature=-crt-static"
    strategy:
      fail-fast: false
      matrix:
        target:
          - arm-unknown-linux-gnueabihf # ARMv6 Linux, hardfloat (kernel 3.2, glibc 2.17)
          - aarch64-unknown-linux-gnu # ARM64 Linux (kernel 4.2, glibc 2.17+)
          - x86_64-unknown-linux-gnu # 64-bit Linux (kernel 2.6.32+, glibc 2.11+)
          - aarch64-unknown-linux-musl # ARM64 Linux with MUSL
          - x86_64-unknown-linux-musl # 64-bit Linux with MUSL
          - arm-unknown-linux-musleabihf # ARMv6 Linux with MUSL, hardfloat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DNP3
        uses: actions/checkout@v6
        with:
          repository: stepfunc/dnp3
          ref: 1.6.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.79.0"
          targets: ${{ matrix.target }}
      - name: Install Rust Cross
        run: cargo install cross
      - name: Create FFI modules dir
        run: mkdir -p ffi-modules/${{ matrix.target }}
      - name: Build FFI
        run: cross build --release -p dnp3-ffi --no-default-features --features tls --target ${{ matrix.target }} --message-format json-render-diagnostics > ffi-modules/${{ matrix.target }}/build.json
      - name: Copy .so
        run: cp  ./target/${{ matrix.target }}/release/libdnp3_ffi.so ./ffi-modules/${{ matrix.target }}
      - name: Upload compiled FFI modules
        uses: actions/upload-artifact@v6
        with:
          name: ffi-modules-${{ matrix.target }}
          path: ffi-modules
  # Package Nuget
  packaging:
    needs: [ffi-cross, ffi-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.79.0"
      - name: Install custom allow-list tool
        run: cargo install --git https://github.com/stepfunc/bom-tools.git --tag 0.2.1
      - name: Checkout DNP3
        uses: actions/checkout@v6
        with:
          repository: stepfunc/dnp3
          ref: 1.6.0
      - name: Download compiled FFI
        uses: actions/download-artifact@v7
        with:
          pattern: ffi-modules-*
          path: ffi-modules
          merge-multiple: true
      - name: Generate cargo metadata
        run: cargo metadata --format-version 1 --locked > metadata.json
      - name: Create third-party-licenses.txt
        run: allow-list gen-licenses-log-dir --list-dir ffi-modules --log-file build.json --metadata-path metadata.json --config-path allowed.json > third-party-licenses.txt
      - name: Upload third-party-licenses.txt
        uses: actions/upload-artifact@v6
        with:
          name: third-party-licenses
          path: third-party-licenses.txt
      - name: Package .NET bindings
        run: cargo run --bin dnp3-bindings -- --dotnet --package ./ffi-modules -o ./packaging.json -f third-party-licenses.txt
      - name: Upload .NET bindings
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-bindings
          path: |
            ffi/bindings/dotnet/nupkg/dnp3*.nupkg
            ffi/bindings/dotnet/nupkg/dnp3*.snupkg
  # Create Github Release
  release:
    needs: [packaging]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            artifacts/dotnet-bindings/dnp3*.nupkg
            artifacts/dotnet-bindings/dnp3*.snupkg
            artifacts/third-party-licenses/third-party-licenses.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
